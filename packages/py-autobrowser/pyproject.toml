[project]
name = "autobrowser"
version = "0.1.0"
description = "Scalable Agentic Browser Automation"
readme = "README.md"
requires-python = "==3.14.*"
dependencies = [
    "browser-use",
    "pydantic-settings",
]

[project.scripts]
autobrowser = "autobrowser.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"