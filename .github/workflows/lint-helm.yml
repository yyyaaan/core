name: Lint Helm Charts

on:
  pull_request:
    paths:
      - '**/helm-chart/**'
      - '**/Chart.yaml'
      - '**/values*.yaml'
      - '**/*.yaml'
      - '.github/workflows/lint-helm.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0

      - name: Lint and Template all Helm charts
        run: |
          set -e
          # Find all directories containing a Chart.yaml file
          CHARTS=$(find . -type f -name 'Chart.yaml' -exec dirname {} \;)
          
          for CHART in $CHARTS; do
            echo "========================================================"
            echo "Processing chart: $CHART"
            echo "========================================================"
            
            echo ">> Running helm lint"
            helm lint "$CHART"
            
            echo ">> Running helm template to catch rendering errors"
            helm template test-release "$CHART" > /dev/null
            
            echo "Successfully verified $CHART"
            echo ""
          done
