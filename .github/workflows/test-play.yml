name: Test Play App

on:
  pull_request:
    paths:
      - 'apps/py-play/**'
      - '!apps/py-play/helm-chart/**'
      - 'packages/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test-play.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-play:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Check lockfile
        run: uv lock --check
        
      - name: Install dependencies
        run: uv sync --package play

      - name: Run Ruff check
        run: uv run ruff check apps/py-play/

      - name: Run Pytest
        run: uv run pytest apps/py-play/tests/ --junitxml=pytest-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "pytest-results.xml"
          comment_title: "🧪 Play App Test Results"
