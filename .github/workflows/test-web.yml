name: Test Web App

on:
  pull_request:
    paths:
      - 'apps/py-web/**'
      - 'packages/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test-web.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-web:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Check lockfile
        run: uv lock --check
        
      - name: Install dependencies
        run: uv sync --package web

      - name: Run Ruff check
        run: uv run ruff check apps/py-web/

      - name: Run Pytest
        run: uv run pytest apps/py-web/tests/ --junitxml=pytest-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "pytest-results.xml"
