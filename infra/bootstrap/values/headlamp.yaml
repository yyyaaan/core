config:
  oidc:
    secret:
      create: false
    externalSecret:
      enabled: true
      name: oidc-secret

ingress:
  enabled: true
  annotations:
    # cert-manager.io/cluster-issuer: letsencrypt-prod  # cloudflare provides
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-force-https@kubernetescrd
  ingressClassName: traefik
  hosts:
    - host: dash.yan.fi
      paths:
        - path: /
          type: ImplementationSpecific
# oidc callback url host.com/oidc-callback