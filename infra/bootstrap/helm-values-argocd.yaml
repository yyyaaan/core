## argocd helm chart is community managed
## this is arguably anti-pattern, but suitable for home lab

nameOverride: argocd
namespaceOverride: argocd

global:
  domain: cd.omop.fi

configs:
  params:  # traefik manages TLS
    server.insecure: true
  cm:
    create: true
    oidc.config: |
      name: Google
      issuer: https://accounts.google.com
      clientID: 719690536564-hrk09vm3gjkqnpr2873q7mnff0qdcv4c.apps.googleusercontent.com
      clientSecret: $oidc-secret:OIDC_CLIENT_SECRET
      requestedScopes:
        - openid
        - profile
        - email
  rbac:
    create: true
    scopes: '[email]'
    policy.default: "" # set to nothing, instead of "role:readonly"
    policy.csv: |
      g, yan@yan.fi, role:admin
  secret:
    createSecret: true

dex:
  enabled: false

server:
  ingress:
    enabled: true
    controller: generic
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.middlewares: kube-system-force-https@kubernetescrd
    extraTls:
      - hosts:
        - cd.omop.fi
        secretName: cd-tls-cert