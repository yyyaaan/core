# this are the dependencies that are always needed for cluster!
# gitops for the below are registered in domain level gitops
---
# 1. Traefik (Remote Helm Chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: bootstrap
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 39.0.7
    helm:
      parameters:
        - name: ports.web.exposedPort
          value: "8080"
        - name: ports.websecure.exposedPort
          value: "8443"
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true
---
# 2. Cert-Manager (Remote Helm Chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: bootstrap
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true
---
# 3. Headlamp (Multiple Sources: Remote Chart + Local Git Values)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: bootstrap
  sources:
    - repoURL: https://kubernetes-sigs.github.io/headlamp/
      chart: headlamp
      targetRevision: 0.41.0
      helm:
        valueFiles:
          - $values/infra/bootstrap/values/headlamp.yaml
    - repoURL: https://github.com/yyyaaan/core.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true
---
# 4. Cluster Bootstrap 
# This will handle your Cloudflare Tunnel, Cert Issuer, Traefik Middleware, and Headlamp RBAC
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-cloudflare-etc
  namespace: argocd
spec:
  project: gitops
  source:
    repoURL: https://github.com/yyyaaan/core.git
    path: infra/bootstrap/manifests
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true