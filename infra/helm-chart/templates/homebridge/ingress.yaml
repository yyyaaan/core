{{- if and  .Values.homebridge.enabled .Values.homebridge.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homebridge-ingress
  namespace: {{ .Values.homebridge.namespace}}
spec:
  ingressClassName: traefik
  rules:
  - host: {{ .Values.homebridge.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homebridge-service
            port:
              number: 8581
{{- end }}