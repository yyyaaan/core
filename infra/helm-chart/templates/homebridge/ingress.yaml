{{- if .Values.homebridge.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homebridge-ingress
  namespace: {{ .Values.homebridge.namespace}}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.certManager.issuerName }}
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - {{ .Values.homebridge.ingress.host }}
    secretName: homebridge-tls-cert
  rules:
  - host: {{ .Values.homebridge.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homebridge-service
            port:
              number: 8581
{{- end }}