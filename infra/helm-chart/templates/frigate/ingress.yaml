{{- if .Values.frigate.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frigate-ingress
  namespace: {{ .Values.frigate.namespace }}
spec:
  ingressClassName: traefik
  rules:
  - host: frigate.{{ .Values.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frigate-service
            port:
              number: 8971
{{- end }}