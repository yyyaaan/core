{{- if .Values.migrationState.completed }}
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
  namespace: {{ .Values.mariaDB.namespace }}
  labels:
    app.kubernetes.io/name: mariadb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mariadb
  ports:
  - port: 3306
    targetPort: 3306
    protocol: TCP
{{- end }}