domain: yan.fi

certManager:
  issuerName: letsencrypt-prod

migrationState:
  completed: true
  migrationPodEnabled: false

homebridge:
  enabled: true
  replicas: 1
  namespace: home-internal
  image:
    repository: homebridge/homebridge
    tag: "2026-02-25"
    pullPolicy: IfNotPresent
  hostPathConfig: /mnt/kingston/home/config/hb
  ingress:
    enabled: true
    host: homebridge.yan.fi

ha: # mariaDB migration flag controls resource provisioning
  enabled: true
  replicas: 1
  namespace: home-internal
  image:
    repository: ghcr.io/home-assistant/home-assistant
    tag: "2026.3.4"
    pullPolicy: IfNotPresent
  envFromSecretList:
    - tz-config
  hostPathConfig: /mnt/kingston/home/config/ha
  hostPathMedia: /mnt/kingston/share/media
  enableBluetooth: true
  ingress:
    host: h.yan.fi

mariaDB:
  namespace: home-internal
  persistentVolume:
    storageClassName: "local-path"  # or "" if problem
    name: mariadb-retained-pv
    hostPath: /mnt/kingston/home/data/volume/mariadb
    storage: 10Gi
  envFromSecret: mariadb-credentials
  image:
    repository: mariadb
    tag: "12.0.2"
    pullPolicy: IfNotPresent
 
auth:
  replicas: 1
  enableMultiAuth: false
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.15.1-alpine"
    pullPolicy: IfNotPresent
  cookieDomain: .yan.fi
  cookieSecure: true
  emailDomain: "*"
  authDomain: auth.yan.fi
  envFromSecret: oauth2-proxy-credentials
  skipAuthRoutes:
    - "^/$"
    - "^/public/.*"
    - "^/docs$"
    - "^/openapi.json$"
    - "^/favicon.ico$"
    - "^/api/health$"
    - "^/robots.txt$"

frigate:
  enabled: true
  replicas: 1
  namespace: home-internal
  image:
    repository: ghcr.io/blakeblackshear/frigate
    tag: "0.17.0"
    pullPolicy: IfNotPresent
  envFromSecret: frigate-credentials
  privileged: true
  shmSize: 384Mi
  cacheSize: 900Mi
  hostPathConfig: /mnt/kingston/home/config/frigate
  hostPathMedia: /mnt/kingston/share/media/frigate
  ingress:
    host: frigate.yan.fi

mqtt:
  enabled: true
  namespace: home-internal
  image:
    repository: eclipse-mosquitto
    tag: "2.1-alpine"
    pullPolicy: IfNotPresent
  hostPathData: /mnt/kingston/home/config/mqtt/config # updated from previous, one level down

restic:
  namespace: home-internal
  schedule: "15 17 * * *"
  timezone: "Europe/Helsinki"
  image:
    repository: restic/restic
    tag: latest
  resticRepository: "s3:s3.eu-central-003.backblazeb2.com/yyyRestic"
  hostPathConfig: /mnt/kingston/home/config

stirlingPdf:
  namespace: web
  replicas: 0
  image:
    repository: stirlingtools/stirling-pdf
    tag: latest
    pullPolicy: IfNotPresent
  ingress:
    host: pdf.yan.fi
