domain: yan.fi

certManager:
  issuerName: letsencrypt-prod

migrationState:
  completed: false
  migrationPodEnabled: true

homebridge:
  enabled: false
  replicas: 1
  namespace: home-internal
  image:
    repository: homebridge/homebridge
    tag: "2026-02-25"
    pullPolicy: IfNotPresent
  hostPathConfig: /media/ya/kingston/home/config/hb
  ingress:
    enabled: true
    host: homebridge.yan.fi

ha: # mariaDB migration flag controls resource provisioning
  enabled: false
  replicas: 1
  namespace: home-internal
  image:
    repository: ghcr.io/home-assistant/home-assistant
    tag: "2026.3.4"
    pullPolicy: IfNotPresent
  envFromSecretList:
    - tz-config
  hostPathConfig: /media/ya/kingston/home/config/ha
  hostPathMedia: /media/ya/kingston/share/media
  enableBluetooth: false
  ingress:
    host: h.yan.fi

mariaDB:
  namespace: home-internal
  persistentVolume:
    storageClassName: "local-path"  # or "" if problem
    name: mariadb-retained-pv
    hostPath: /media/ya/kingston/home/data/volume/mariadb
    storage: 10Gi
  envFromSecret: mariadb-credentials
  image:
    repository: mariadb
    tag: "12.0.2"
    pullPolicy: IfNotPresent
 
auth:
  replicas: 1
  enableMultiAuth: false
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.15.1-alpine"
    pullPolicy: IfNotPresent
  cookieDomain: .yan.fi
  cookieSecure: true
  emailDomain: "*"
  authDomain: auth.yan.fi
  envFromSecret: oauth2-proxy-credentials
  skipAuthRoutes:
    - "^/$"
    - "^/public/.*"
    - "^/docs$"
    - "^/openapi.json$"
    - "^/favicon.ico$"
    - "^/api/health$"
    - "^/robots.txt$"

frigate:
  enabled: false
  replicas: 1
  namespace: home-internal
  image:
    repository: ghcr.io/blakeblackshear/frigate
    tag: "0.17.0"
    pullPolicy: IfNotPresent
  envFromSecret: frigate-credentials
  privileged: true
  shmSize: 384Mi
  cacheSize: 900Mi
  hostPathConfig: /media/ya/kingston/home/config/ha
  hostPathMedia: /media/ya/kingston/share/media/frigate
  ingress:
    host: frigate.yan.fi

mqtt:
  enabled: false
  namespace: home-internal
  image:
    repository: eclipse-mosquitto
    tag: "2.1-alpine"
    pullPolicy: IfNotPresent
  hostPathData: /media/ya/kingston/home/config/mqtt/config # updated from previous, one level down

stirlingPdf:
  namespace: web
  replicas: 1
  image:
    repository: stirlingtools/stirling-pdf
    tag: latest
    pullPolicy: IfNotPresent
  ingress:
    host: pdf.yan.fi

poller:
  namespace: home-internal
  image:
    repository: yyyaaan/poller
    tag: "alpha0"
    pullPolicy: IfNotPresent
  timezone: "Europe/Helsinki"
  envFromSecretList:
    - mariadb-credentials
    - poller-credentials
  hostPathConfig: /media/ya/kingston/home/config/poller
  hostPathMedia: /media/ya/kingston/share/media
  hostPathForData: /media/ya/kingston/home/data/app
  resources:
    limits:
      cpu: "1500m"
      memory: "3Gi"
  jobs:
    - name: elenia
      suspend: true
      schedule: "2-59/15 * * * *"
      command: 
        - "/usr/local/bin/python"
        - "/app/job_elenia.py"
    - name: timelapse
      suspend: true
      schedule: "3 1 * * *"
      command: 
        - "/usr/local/bin/python"
        - "/app/job_timelapse.py"
    - name: ffmpeg
      suspend: true
      schedule: "55 5 * * *"
      command: 
        - "/bin/sh"
        - "/app/job_ffmpeg.sh"
    # - name: backup
    #   schedule: "55 6 * * *"
    #   command: 
    #     - "/bin/sh"
    #     - "/app/job_backup.sh"