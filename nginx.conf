events { }

http {
    server {
        listen 80;
        server_name h.yan.fi pi.yan.fi;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            if ($host = h.yan.fi) {
                return 301 https://$host$request_uri;
            }

            if ($host = pi.yan.fi) {
                return 301 https://$host$request_uri;
            }
        }
    }

    server {
        listen 443 ssl;
        server_name h.yan.fi;

        ssl_certificate /etc/letsencrypt/live/h.yan.fi/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/h.yan.fi/privkey.pem;

        location / {
            proxy_pass http://localhost:8123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name pi.yan.fi;

        ssl_certificate /etc/letsencrypt/live/pi.yan.fi/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pi.yan.fi/privkey.pem;

        location / {
            proxy_pass http://web2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /path/ {
            proxy_pass http://web3/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            rewrite ^/path/(.*)$ /$1 break;
        }
    }
}
