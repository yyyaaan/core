events { }

http {
    server {
        listen 80;
        server_name h.yan.fi pi.yan.fi;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            if ($host = h.yan.fi) {
                return 301 https://$host$request_uri;
            }

            if ($host = pi.yan.fi) {
                return 301 https://$host$request_uri;
            }
        }
    }

    server {
        listen 443 ssl;
        server_name h.yan.fi;

        ssl_certificate /etc/letsencrypt/live/h.yan.fi/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/h.yan.fi/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubdomains";
        
        ssl_protocols TLSv1.2;
        ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4";
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        proxy_buffering off;

        location / {
            proxy_pass http://192.168.4.81:8123;
            proxy_redirect http:// https://;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 443 ssl;
        server_name pi.yan.fi;
    
        client_max_body_size 99m;

        ssl_certificate /etc/letsencrypt/live/pi.yan.fi/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pi.yan.fi/privkey.pem;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            resolver 127.0.0.11 valid=30s;
            set $WebBackend web2;
            proxy_pass http://$WebBackend:80;
        }

        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            client_max_body_size 20m;
    
            resolver 127.0.0.11 valid=30s;
            set $V2Api v2;
            proxy_pass http://fastapps:8001/;
        }

        location /frigate/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Ingress-Path "/frigate";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            resolver 127.0.0.11 valid=30s;
            set $FrigateBackend frigate;
            rewrite ^/frigate/(.*)$ /$1 break;
            proxy_pass http://$FrigateBackend:8971;
        }
    
        location = /pdf {
            return 301 $scheme://$host/pdf/;
        }

        location /pdf/ {
            # Standard Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # The "Magic" for subpaths
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Use the variable but ensure the URI is appended
            resolver 127.0.0.11 valid=30s;
            set $PdfContainer pdf;
            
            # Adding /$request_uri or ensuring the trailing slash is vital 
            # when using variables in proxy_pass
            proxy_pass http://$PdfContainer:8080;
            
            # Increase timeout for large PDF processing
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }

        location /play/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            resolver 127.0.0.11 valid=30s;
            set $PlayBackend play;
            rewrite ^/play/(.*)$ /$1 break;
            proxy_pass http://$PlayBackend:7999;
        }
    }
}
