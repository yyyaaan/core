apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth
  namespace: auth
spec:
  forwardAuth:
    address: http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth
    # address: https://{{ .Values.auth.authDomain }}/oauth2/auth
    trustForwardHeader: true
    # the following may be deleted to preserve all headers from oauth2-proxy
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization