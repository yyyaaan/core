apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth
  namespace: {{ .Values.auth.namespace }}
spec:
  forwardAuth:
    # address: http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth
    address: https://{{ .Values.auth.authDomain }}/oauth2/auth
    trustForwardHeader: true
    authRequestHeaders:
      - X-Forwarded-Proto
      - X-Forwarded-Host
      - X-Forwarded-Uri
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization