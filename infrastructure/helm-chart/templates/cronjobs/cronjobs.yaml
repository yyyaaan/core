# note for using $ for global values in helm templates
{{- range .Values.poller.jobs }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: poller-{{ .name }}
  namespace: {{ $.Values.poller.namespace }}
  labels:
    app.kubernetes.io/name: poller
    app.kubernetes.io/component: {{ .name }}
spec:
  schedule: {{ .schedule | quote }}
  timeZone: {{ $.Values.poller.timezone | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300 # Only try to "catch up" if missed by < 5 minutes
  suspend: {{ .suspend }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: poller
            app.kubernetes.io/component: {{ .name }}
        spec:
          restartPolicy: OnFailure
          containers:
          - name: {{ .name }}
            image: "{{ $.Values.poller.image.repository }}:{{ $.Values.poller.image.tag }}"
            imagePullPolicy: {{ $.Values.poller.image.pullPolicy }}
            command:
{{ toYaml .command | indent 14 }}
            envFrom:
            {{- range $.Values.poller.envFromSecretList }}
              - secretRef:
                  name: {{ . | quote }}
            {{- end }}
            volumeMounts:
            - name: config
              mountPath: /backup
            - name: media
              mountPath: /media
            - name: data-volume
              mountPath: /mnt
          volumes:
          - name: config
            hostPath:
              path: {{ $.Values.poller.hostPathConfig }}
              type: DirectoryOrCreate
          - name: media
            hostPath:
              path: {{ $.Values.poller.hostPathMedia }}
              type: DirectoryOrCreate          
          - name: data-volume
            hostPath:
              path: {{ $.Values.poller.hostPathForData }}
              type: DirectoryOrCreate
{{- end }}