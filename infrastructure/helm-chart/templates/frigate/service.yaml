apiVersion: v1
kind: Service
metadata:
  name: frigate-service
  namespace: {{ .Values.frigate.namespace }}
  labels:
    app.kubernetes.io/name: frigate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frigate
  ports:
  - name: web-ui
    port: 8971
    targetPort: 8971
    protocol: TCP
  - name: api
    port: 5000
    targetPort: 5000
    protocol: TCP
  - name: rtsp
    port: 8554
    targetPort: 8554
    protocol: TCP
  - name: webrtc-tcp
    port: 8555
    targetPort: 8555
    protocol: TCP
  - name: webrtc-udp
    port: 8555
    targetPort: 8555
    protocol: UDP