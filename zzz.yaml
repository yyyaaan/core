# Source: yan-fi-server/templates/cronjobs/cronjob-restic.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: restic
  namespace: home-internal
  labels:
    app.kubernetes.io/name: restic
    app.kubernetes.io/component: backup
spec:
  schedule: "15 17 * * *"
  timeZone: "Europe/Helsinki"
  concurrencyPolicy: Forbid 
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
          - name: mariadb-dump
            image: mariadb:12.0.2
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-c"]
            args: 
            - "mariadb-dump -h mariadb-service -u root -p$DB_PASSWORD --all-databases > /db-dump/dump.sql"
            env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-credentials
                  key: MARIADB_ROOT_PASSWORD
            volumeMounts:
            - name: dump-volume
              mountPath: /db-dump
          containers:
          - name: restic
            image: restic/restic:latest
            args:
            - -r
            - "s3:s3.eu-central-003.backblazeb2.com/yyyRestic"
            - backup
            - /home-configs
            - /db-dump
            - --exclude="backup"
            - --exclude="backups"
            securityContext:
              runAsUser: 0 
            envFrom:
            - secretRef:
                name: restic-credentials
            volumeMounts:
            - name: config-folder
              mountPath: /home-configs
              readOnly: true
            - name: dump-volume
              mountPath: /db-dump
              readOnly: true
          volumes:
          - name: config-folder
            hostPath:
              path: /mnt/kingston/home/config
              type: Directory
          - name: dump-volume
            emptyDir: {}
---
