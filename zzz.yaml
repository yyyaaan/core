          - "--skip-auth-route=^/public/.*"
          - "--skip-auth-route=^/docs$"
          - "--skip-auth-route=^/openapi.json$"
          - "--skip-auth-route=^/favicon.ico$"
          - "--skip-auth-route=^/api/health$"
          - "--skip-auth-route=^/robots.txt$"
