        <button onclick="closeProject()" class="text-xs opacity-40 hover:opacity-100 transition-opacity">✕</button>

                    <span class="text-[10px] font-mono opacity-40 group-hover:opacity-100">@yyyaaan</span>

        <div class="pt-4 border-t-2 border-black">

            </p>
        </div>

        <button hx-get="/api/project/about" hx-target="#about-overlay" hx-swap="innerHTML" onclick="closeProject()" class="block w-full px-4 py-3 bg-black text-white text-[10px] uppercase tracking-[0.2em] font-bold text-center hover:bg-white hover:text-black hover:outline hover:outline-1 hover:outline-black transition-all">
