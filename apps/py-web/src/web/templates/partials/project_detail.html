<div class="flex flex-col">
    <div class="flex justify-between items-start mb-6">
        <div>
            <h3 class="text-xs font-bold uppercase tracking-widest">Project Archive</h3>
            <p class="text-[10px] text-black/40 font-mono">Ref. {{ project.id }}</p>
        </div>
        <button onclick="closeProject()" class="text-xs opacity-40 hover:opacity-100 transition-opacity">✕</button>
    </div>
    
    <div class="w-full h-40 border border-black overflow-hidden bg-[#FDFCF8] relative mb-6">
        <div class="absolute inset-0 opacity-10 filter blur-xl" style="background-color: {{ project.color }}"></div>
        <div class="absolute inset-0 flex items-center justify-center">
             <span class="text-[12px] uppercase tracking-[0.1em] font-bold opacity-60">{{ project.summary|safe or project.title|safe }}</span>
        </div>
    </div>

    <div class="space-y-4">
        <div class="flex justify-between items-center border-b border-black/5 pb-2">
            <span class="text-xs font-medium uppercase tracking-tighter">Identity</span>
            <span class="text-[10px] font-mono bg-black text-white px-2 py-0.5 uppercase">{{ project.title }}</span>
        </div>
        
        <p class="text-[12px] text-black/70 leading-relaxed italic border-l-2 border-black pl-4">
            "{{ project.desc }}"
        </p>

        <a href="#" class="block w-full mt-6 px-4 py-3 bg-black text-white text-[10px] uppercase tracking-[0.2em] font-bold text-center hover:bg-white hover:text-black hover:outline hover:outline-1 hover:outline-black transition-all">
            Open Discovery
        </a>
    </div>
</div>
