<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y... | YYYaaan | AI ML, Data, Home Automation, Statistics - healthcare, open data - </title>
    
    <!-- HTMX: Zero Node dependencies -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    
    <!-- Tailwind 4 Browser Support: Zero Node dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@0.474.0"></script>

    <style>
        @theme {
            --color-bg-primary: #FDFCF8;
            --color-ink: #1A1A1A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFCF8;
            color: #1A1A1A;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Organic Bubble Node */
        .bubble-node {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Organic non-perfect circle shape */
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: organic-morph 12s infinite alternate ease-in-out;
        }

        @media (max-width: 768px) {
            .bubble-node {
                width: 75px;
                height: 75px;
            }
            .wheel-container {
                width: 90vw;
                height: 90vw;
            }
        }

        @keyframes organic-morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            33% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            66% { border-radius: 40% 40% 50% 50% / 40% 50% 40% 50%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        .bubble-node:hover {
            border-radius: 50% !important;
            animation-play-state: paused;
            border-color: rgba(0,0,0,1);
        }

        /* Sub-wheel Styles */
        .sub-wheel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 180px;
            height: 180px;
            pointer-events: none;
            z-index: 50;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sub-wheel.active {
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .sub-link {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            border: 1px solid #000;
            border-radius: 50%;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            color: #000;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }

        .sub-link:hover {
            background: #000;
            color: #FFF;
            transform: translate(-50%, -50%) scale(1.15);
        }

        /* Grid Background Overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        
        /* Spin Wheel Custom Styles */
        .wheel-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            z-index: 0;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .wheel-container.pushed {
            top: 10%;
            left: 10%;
            transform: translate(-40%, -40%) scale(0.65);
            opacity: 0.2;
            pointer-events: none;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .wheel-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0% 0%;
            cursor: pointer;
            transition: scale 0.3s ease;
        }
        
        .wheel-item:hover {
            scale: 1.1;
        }

        /* Tooltip / Modal (Artistic Flair Shadow) */
        #project-modal {
            position: fixed;
            bottom: 60px;
            right: 60px;
            width: 450px;
            max-width: calc(100vw - 120px);
            background: #FFFFFF;
            border: 1px solid #000000;
            box-shadow: 20px 20px 0px 0px rgba(0,0,0,1);
            padding: 32px;
            z-index: 100;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #project-modal {
                bottom: 20px;
                right: 20px;
                left: 20px;
                width: auto;
                max-width: none;
                margin: 0;
                box-shadow: 10px 10px 0px 0px rgba(0,0,0,1);
                padding: 24px;
            }
        }

        #project-modal.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* About Overlay */
        #about-overlay {
            position: fixed;
            inset: 0;
            background: #FDFCF8;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        #about-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .about-bg-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.05;
            z-index: 0;
        }

        .nav-link {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #1A1A1A;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    {% block content %}{% endblock %}
    
    <!-- Modal for HTMX to target -->
    <div id="project-modal">
        <!-- Content will be injected here -->
    </div>

    <!-- Full page About Overlay -->
    <div id="about-overlay">
        <!-- CV content will be injected here -->
    </div>

    <script>
        function showAbout() {
            const overlay = document.getElementById('about-overlay');
            if (overlay) {
                // Ensure other modals are closed and wheel is home
                if (typeof closeProject === 'function') closeProject();
                overlay.classList.add('show');
            }
        }

        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.target.id === 'project-modal') {
                const modal = evt.detail.target;
                modal.classList.add('show');
                
                const wheelContainer = document.querySelector('.wheel-container');
                if (wheelContainer) wheelContainer.classList.add('pushed');
            } else if (evt.detail.target.id === 'about-overlay') {
                showAbout();
            }
        });

        function closeProject() {
            const modal = document.getElementById('project-modal');
            if (modal) modal.classList.remove('show');
            
            const wheelContainer = document.querySelector('.wheel-container');
            if (wheelContainer) {
                wheelContainer.classList.remove('pushed');
                window.dispatchEvent(new CustomEvent('wheel:reset'));
            }
        }

        function closeAbout() {
            const overlay = document.getElementById('about-overlay');
            if (overlay) overlay.classList.remove('show');
        }

        // Click outside to close
        window.addEventListener('mousedown', function(e) {
            const modal = document.getElementById('project-modal');
            if (modal.classList.contains('show') && !modal.contains(e.target)) {
                if (!e.target.closest('[hx-get]')) {
                    closeProject();
                }
            }
        });
    </script>
</body>
</html>
