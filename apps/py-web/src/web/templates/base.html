<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off Grid | Artistic Flair Archive</title>
    
    <!-- HTMX: Zero Node dependencies -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    
    <!-- Tailwind 4 Browser Support: Zero Node dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        @theme {
            --color-bg-primary: #FDFCF8;
            --color-ink: #1A1A1A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFCF8;
            color: #1A1A1A;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Grid Background Overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        
        /* Spin Wheel Custom Styles */
        .wheel-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            z-index: 0;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .wheel-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0% 0%;
            cursor: pointer;
            transition: scale 0.3s ease;
        }
        
        .wheel-item:hover {
            scale: 1.1;
        }

        /* Tooltip / Modal (Artistic Flair Shadow) */
        #project-modal {
            position: fixed;
            bottom: 60px;
            right: 60px;
            width: 350px;
            background: #FFFFFF;
            border: 1px solid #000000;
            box-shadow: 20px 20px 0px 0px rgba(0,0,0,1);
            padding: 24px;
            z-index: 100;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #project-modal.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .nav-link {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #1A1A1A;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .nav-link:hover {
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    {% block content %}{% endblock %}
    
    <!-- Modal for HTMX to target -->
    <div id="project-modal">
        <!-- Content will be injected here -->
    </div>

    <script>
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.target.id === 'project-modal') {
                evt.detail.target.classList.add('show');
            }
        });

        function closeProject() {
            document.getElementById('project-modal').classList.remove('show');
        }
    </script>
</body>
</html>
