apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-video
  namespace: {{ .Values.ffmpeg.namespace }}
  labels:
    app.kubernetes.io/name: video
    app.kubernetes.io/component: scheduled
spec:
  schedule: {{ .Values.ffmpeg.schedule | quote }}
  timeZone: {{ .Values.ffmpeg.timezone | quote}}
  concurrencyPolicy: Forbid 
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          initContainers:
          - name: frigate-export
            image: "{{ .Values.ffmpeg.image.repository }}:{{ .Values.ffmpeg.image.tag }}"
            imagePullPolicy: {{ .Values.ffmpeg.image.pullPolicy }}
            command: ["/bin/bash", "-c"]
            args:  # -u make sure print out not buffered
              - |
                python3 -u - << 'EOF'
                from datetime import datetime, timedelta
                from time import sleep
                from requests import get, post

                offset = 0                  # yesterday
                hours = 24                  # a whole day
                name_prefix = "day90sec"
                max_polling_hours = 8
                polling_interval_seconds = 300
                frigate_url = "http://frigate-service.home-internal.svc.cluster.local:5000"

                now = datetime.now()
                end_polling_time = now + timedelta(hours=max_polling_hours)
                print("Started", now)

                yesterday_end = datetime(now.year, now.month, now.day)
                ts = int(yesterday_end.timestamp()) - offset * 3600
                ts0 = ts - hours * 3600

                r = post(
                    url=f"{frigate_url}/api/export/yard/start/{ts0}/end/{ts}",
                    json={
                        "playback": "timelapse_25x",  # actual speed set in frigate config
                        "name": f"{name_prefix}_{datetime.fromtimestamp(ts0):%Y%m%d}.mp4",
                    },
                )

                print(f"{datetime.fromtimestamp(ts0):%b%dT%H:%M:%S}--{datetime.fromtimestamp(ts):%b%dT%H:%M:%S}")
                print(r.text, r.status_code, flush=True)

                # polling for completion
                export_id = r.json()["export_id"]

                def check_completion(export_id: str) -> bool:
                    """poll for completion (the opposite of in progress)"""
                    r_status = get(url=f"{frigate_url}/api/exports")
                    for item in r_status.json():
                        if item["id"] == export_id:
                            return not item["in_progress"]
                    raise Exception("Export ID not found in polling endpoint")


                export_completed = False
                while not export_completed:
                    sleep(10)
                    export_completed = check_completion(export_id)
                    print("waiting...", flush=True)
                    if datetime.now() > end_polling_time:
                        raise Exception("Polling ends due to time limit. Export not completed")
                    sleep(polling_interval_seconds)

                print("Ready!")
                EOF
            envFrom:
            {{- range .Values.ffmpeg.envFromSecretList }}
              - secretRef:
                  name: {{ . | quote }}
            {{- end }}
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            resources:
              requests:
                cpu: "10m"
                memory: "10Mi"
              limits:
                cpu: "100m"
                memory: "100Mi"
          containers:
          - name: ffmpeg-encoding
            image: yyyaaan/poller:alpha1
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "/app/job_ffmpeg.sh"]
            envFrom:
            {{- range $.Values.ffmpeg.envFromSecretList }}
              - secretRef:
                  name: {{ . | quote }}
            {{- end }}
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
            volumeMounts:
            - name: media-folder
              mountPath: /media
          volumes:
          - name: media-folder
            hostPath:
              path: {{ .Values.ffmpeg.hostPathMedia }}
              type: Directory
